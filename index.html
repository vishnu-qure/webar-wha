<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>qure.ai WebAR</title>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        transition: opacity 0.8s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.02em;
      }

      .splash-logo span {
        color: #4A90D9;
      }

      .splash-divider {
        width: 40px;
        height: 1px;
        background: rgba(255,255,255,0.2);
      }

      .splash-instruction {
        text-align: center;
        color: rgba(255,255,255,0.6);
        font-size: 0.9rem;
        line-height: 1.8;
        max-width: 280px;
      }

      .splash-instruction strong {
        color: #fff;
        display: block;
        font-size: 1rem;
        margin-bottom: 0.5rem;
      }

      /* ── AR scene wrapper ── */
      #ar-scene {
        position: fixed;
        inset: 0;
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      #ar-scene.visible {
        visibility: visible;
        opacity: 1;
        pointer-events: auto;
      }

      /* ── HUD overlay ── */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding: 1.2rem 1.5rem;
        display: none;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      }

      #hud.visible {
        display: flex;
      }

      .hud-logo {
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.01em;
      }

      .hud-logo span {
        color: #4A90D9;
      }

      .hud-hint {
        font-size: 0.75rem;
        color: rgba(255,255,255,0.6);
        font-style: italic;
      }

      /* ── Scene indicator ── */
      #scene-indicator {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      #scene-indicator.visible {
        display: flex;
      }

      .scene-label {
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 0.4rem 1rem;
        border-radius: 20px;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-style: italic;
        opacity: 0;
        transition: opacity 0.5s;
      }

      .scene-label.show {
        opacity: 1;
      }

      .scene-dots {
        display: flex;
        gap: 6px;
      }

      .sdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        transition: all 0.3s;
      }

      .sdot.lit {
        background: #4A90D9;
        width: 18px;
        border-radius: 3px;
      }

      /* ── Scan prompt ── */
      #scan-prompt {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        pointer-events: none;
      }

      .scan-frame {
        width: 220px;
        height: 220px;
        position: relative;
        opacity: 0.7;
      }

      .scan-frame::before,
      .scan-frame::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #fff;
        border-style: solid;
      }

      .scan-frame::before {
        top: 0; left: 0;
        border-width: 2px 0 0 2px;
      }

      .scan-frame::after {
        bottom: 0; right: 0;
        border-width: 0 2px 2px 0;
      }

      .scan-frame-tr,
      .scan-frame-bl {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #fff;
        border-style: solid;
      }

      .scan-frame-tr {
        top: 0; right: 0;
        border-width: 2px 2px 0 0;
      }

      .scan-frame-bl {
        bottom: 0; left: 0;
        border-width: 0 0 2px 2px;
      }

      .scan-line {
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(to right, transparent, #4A90D9, transparent);
        animation: scanline 2s ease-in-out infinite;
      }

      @keyframes scanline {
        0% { top: 10%; }
        50% { top: 90%; }
        100% { top: 10%; }
      }

      .scan-text {
        color: rgba(255,255,255,0.7);
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-style: italic;
      }

      .scan-text.error {
        color: #ffb3b3;
        max-width: 280px;
        line-height: 1.6;
        text-align: center;
        text-transform: none;
        letter-spacing: 0.02em;
      }

      #scan-prompt.hidden {
        display: none;
      }

      .start-button {
        pointer-events: auto;
        appearance: none;
        border: 1px solid rgba(255,255,255,0.45);
        margin-top: 20px;
        border-radius: 999px;
        background: rgba(74,144,217,0.86);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        line-height: 1;
        padding: 0.85rem 1.4rem;
        text-decoration: none;
      }

      .start-button:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }
    </style>
  </head>

  <body>

    <!-- ── Camera permission ── -->
    <div id="splash">
      <div class="splash-logo">qure<span>.ai</span></div>
      <div class="splash-divider"></div>
      <div class="splash-instruction">
        <strong id="cameraTitle">Starting camera</strong>
        <span id="cameraDetail">Allow camera access when prompted.</span>
      </div>
      <a class="start-button" href="https://qure-ai-healthcare.vercel.app/stories">Start</a>
    </div>

    <!-- ── HUD ── -->
    <div id="hud">
      <div class="hud-logo">qure<span>.ai</span></div>
      <div class="hud-hint">Point at the QR code</div>
    </div>

    <!-- ── Scene indicator ── -->
    <div id="scene-indicator">
      <div class="scene-label" id="sceneLabel"></div>
      <div class="scene-dots">
        <div class="sdot" id="dot0"></div>
      </div>
    </div>

    <!-- ── Scan prompt ── -->
    <div id="scan-prompt">
      <div class="scan-frame">
        <div class="scan-frame-tr"></div>
        <div class="scan-frame-bl"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-text">Aim at the QR code</div>
      <a class="start-button" href="https://qure-ai-healthcare.vercel.app/stories">Start</a>
    </div>

    <!-- ── AR Scene ── -->
    <div id="ar-scene">
      <a-scene
        mindar-image="
          imageTargetSrc: targets.mind;
          autoStart: false;
          uiLoading: no;
          uiScanning: no;
          uiError: no;
          filterMinCF: 0.001;
          filterBeta: 0.001;
          missTolerance: 5;
          warmupTolerance: 3;
        "
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
      >
        <a-assets>
          <video id="arVideo" src="videos/ar-video.mp4" playsinline muted crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Single AR target (target index 0) -->
        <a-entity mindar-image-target="targetIndex: 0" id="arTarget">
          <a-video
            src="#arVideo"
            position="0 0 0.001"
            width="1" height="0.552"
            rotation="0 0 0"
          ></a-video>
        </a-entity>

      </a-scene>
    </div>

    <script>
      const sceneName = 'AR Experience';
      const redirectUrl = 'https://qure-ai-healthcare.vercel.app/stories';
      const video     = document.getElementById('arVideo');
      const dot       = document.getElementById('dot0');
      const label    = document.getElementById('sceneLabel');
      const splash   = document.getElementById('splash');
      const cameraTitle = document.getElementById('cameraTitle');
      const cameraDetail = document.getElementById('cameraDetail');
      const scanProm = document.getElementById('scan-prompt');
      const scanText = document.querySelector('.scan-text');

      let arStarted  = false;
      let targetActive = false;
      let targetsHooked = false;
      let hasRedirected = false;
      let cameraStartAttempted = false;
      let fallbackHooked = false;

      video.addEventListener('ended', () => {
        if (hasRedirected) return;

        hasRedirected = true;
        window.location.href = redirectUrl;
      });

      window.addEventListener('load', () => {
        setTimeout(() => requestCameraAndStart(), 250);
      });

      async function requestCameraAndStart() {
        if (cameraStartAttempted) return;
        cameraStartAttempted = true;

        cameraTitle.textContent = 'Starting camera';
        cameraDetail.textContent = 'Allow camera access when prompted.';

        if (!window.isSecureContext) {
          cameraTitle.textContent = 'HTTPS required';
          cameraDetail.textContent = 'Open the hosted https:// URL on your phone.';
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          cameraTitle.textContent = 'Camera unavailable';
          cameraDetail.textContent = 'Please try Chrome or Safari on your phone.';
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false
          });
          // Stop the test stream immediately — MindAR will open its own
          stream.getTracks().forEach(t => t.stop());
        } catch (err) {
          console.error('Camera permission failed:', err);
          cameraStartAttempted = false;
          cameraTitle.textContent = 'Camera access required';
          cameraDetail.textContent = 'Tap anywhere to allow camera access.';
          hookCameraFallback();
          return;
        }

        scanText.textContent = 'Starting camera';
        scanText.classList.remove('error');
        splash.classList.add('hidden');
        setTimeout(initAR, 800);
      }

      function hookCameraFallback() {
        if (fallbackHooked) return;

        fallbackHooked = true;
        splash.addEventListener('click', () => {
          fallbackHooked = false;
          requestCameraAndStart();
        }, { once: true });
      }

      function initAR() {
        const arDiv   = document.getElementById('ar-scene');
        const hud     = document.getElementById('hud');
        const indic   = document.getElementById('scene-indicator');

        arDiv.classList.add('visible');
        hud.classList.add('visible');
        indic.classList.add('visible');

        const sceneEl = arDiv.querySelector('a-scene');

        startMindAR(sceneEl);

        if (targetsHooked) return;
        targetsHooked = true;

        const entity = document.getElementById('arTarget');

        entity.addEventListener('targetFound', onTargetFound);

        entity.addEventListener('targetLost', onTargetLost);
      }

      function startMindAR(sceneEl) {
        if (arStarted) return;

        const start = async () => {
          if (arStarted) return;

          try {
            const sys = sceneEl.systems['mindar-image-system'];
            if (!sys) throw new Error('MindAR system is not ready yet.');

            await sys.start();
            arStarted = true;
            scanText.textContent = 'Aim at the QR code';
            scanText.classList.remove('error');
          } catch (err) {
            console.error('Failed to start MindAR:', err);
            scanText.textContent = 'Camera failed to start. Check camera permission, HTTPS, and reload the page.';
            scanText.classList.add('error');
          }
        };

        if (sceneEl.hasLoaded) {
          start();
        } else {
          sceneEl.addEventListener('loaded', start, { once: true });
        }
      }

      function onTargetFound() {
        targetActive = true;
        scanProm.classList.add('hidden');

        video.currentTime = 0;
        video.play().catch(() => {});
        dot.classList.add('lit');

        label.textContent = sceneName;
        label.classList.add('show');
      }

      function onTargetLost() {
        if (targetActive) {
          targetActive = false;
          video.pause();
          label.classList.remove('show');
          scanProm.classList.remove('hidden');
          dot.classList.remove('lit');
        }
      }
    </script>

  </body>
</html>
